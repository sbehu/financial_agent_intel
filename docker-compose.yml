services:
  financial_analyst_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: amex_financial_agent_container
    ports:
      - "8501:8501"
    volumes:
      - .:/app
      - /app/.venv/
      - /app/__pycache__/
    environment:
      - PYTHONUNBUFFERED=1
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: always